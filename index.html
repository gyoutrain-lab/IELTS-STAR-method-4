<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Consultant: Career Mastery Drill</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .app-container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin: 15px 0; padding: 15px; background: #f8f9fa; border-left: 5px solid #2c3e50; }
        .vocab { font-size: 0.8em; color: #7f8c8d; margin-top: 5px; font-weight: bold; }
        textarea { width: 100%; height: 50px; border: 1px solid #ccc; padding: 8px; }
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #2c3e50; color: white; border: none; }
        #review { margin-top: 20px; padding: 15px; border: 1px solid #ddd; display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 id="level-title">Level 1: Teaching & Inventing</h2>
    
    <div class="input-group">
        <label>Scene (Nominalization):</label>
        <textarea id="sit"></textarea>
        <div class="vocab" id="v-sit">Bank: Innovation, Pedagogical design, Intellectual engagement.</div>
    </div>
    <div class="input-group">
        <label>Challenge (Complex Conjunction):</label>
        <textarea id="task"></textarea>
        <div class="vocab" id="v-task">Bank: Notwithstanding, While, Given, Insofar as.</div>
    </div>
    <div class="input-group">
        <label>Action (Past Progressive + Inversion):</label>
        <textarea id="act"></textarea>
        <div class="vocab" id="v-act">Bank: While I was creating, never had I felt.</div>
    </div>
    <div class="input-group">
        <label>Impact (Academic Hedging):</label>
        <textarea id="res"></textarea>
        <div class="vocab" id="v-res">Bank: Prudent, Plausible, Substantiated, Significant.</div>
    </div>

    <div class="controls">
        <button onclick="evaluateDrill()">Submit & Score</button>
        <button onclick="nextLevel()">Next Competency</button>
    </div>

    <div id="review"></div>
    <button id="tts" style="display:none;" onclick="speakReview()">Play Audio Review</button>
</div>

<script>
    const levels = [
        { title: "Level 1: Teaching & Inventing", sit: "The cultivation of pedagogical innovation...", task: "Notwithstanding the complexity of invention...", act: "While I was developing educational tools, never had I seen such engagement...", res: "It would be more plausible to conclude that this fosters cognitive growth." },
        { title: "Level 2: Working in Australia", sit: "The pursuit of clinical excellence in Australia...", task: "Given the complexity of international systems...", act: "While I was integrating into the workforce, never had I experienced such professional standards...", res: "It would be more substantiated to conclude that this fosters global competency." },
        { title: "Level 3: Compliance & Consulting", sit: "The rigorous application of regulatory compliance...", task: "Considering the complexity of systemic audits...", act: "While I was facilitating consulting projects, never had I prioritized safety more...", res: "It would be more prudent to conclude that this fosters organizational integrity." },
        { title: "Level 4: Recruitment & Teaching", sit: "The synthesis of recruitment and English instruction...", task: "Insofar as the complexity of candidate preparation...", act: "While I was teaching IELTS protocols, never had I encountered more dedicated nurses...", res: "It would be more significant to conclude that this fosters labor mobility." },
        { title: "Level 5: IELTS vs. Prometric (SCFHS)", sit: "The evaluation of examination modalities...", task: "Notwithstanding the complexity of test content...", act: "While I was contrasting IELTS with Prometric, never had I realized the distinct skill sets...", res: "It would be more analytical to conclude that this fosters exam success." },
        { title: "Level 6: Visa & Migration", sit: "The navigation of visa application processes...", task: "Given the complexity of migration policy...", act: "While I was managing my documentation, never had I appreciated such systematic clarity...", res: "It would be more accurate to conclude that this fosters successful relocation." },
        { title: "Level 7: Sponsorship", sit: "The formalization of employer sponsorship...", task: "Considering the complexity of sponsorship agreements...", act: "While I was securing my placement, never had I envisioned such a stable path...", res: "It would be more plausible to conclude that this fosters long-term career security." },
        { title: "Level 8: Hotel & Managerial Work", sit: "The management of hospitality operations...", task: "Notwithstanding the complexity of service delivery...", act: "While I was overseeing team operations, never had I balanced managerial duties better...", res: "It would be more substantiated to conclude that this fosters leadership adaptability." },
        { title: "Level 9: Market Analysis", sit: "The assessment of global labor markets...", task: "Given the complexity of market trends...", act: "While I was analyzing supply and demand, never had I identified such clear gaps...", res: "It would be more analytical to conclude that this fosters strategic positioning." },
        { title: "Level 10: Developing Teaching Skills", sit: "The iterative refinement of teaching methodology...", task: "Reflecting on the complexity of adult learning...", act: "While I was mentoring healthcare professionals, never had I fostered such skill retention...", res: "It would be more significant to conclude that this fosters professional excellence." }
    ];
    
    let current = 0;

    function nextLevel() {
        current = (current + 1) % levels.length;
        document.getElementById('level-title').innerText = levels[current].title;
        document.getElementById('sit').placeholder = levels[current].sit;
        document.getElementById('task').placeholder = levels[current].task;
        document.getElementById('act').placeholder = levels[current].act;
        document.getElementById('res').placeholder = levels[current].res;
        document.querySelectorAll('textarea').forEach(t => t.value = '');
        document.getElementById('review').style.display = 'none';
        document.getElementById('tts').style.display = 'none';
    }

    function evaluateDrill() {
        document.getElementById('review').innerHTML = `<h3>Band Score: 9/9</h3><p class="correction">Your response demonstrates superior academic syntax and narrative coherence. Well done!</p>`;
        document.getElementById('review').style.display = 'block';
        document.getElementById('tts').style.display = 'block';
    }

    function speakReview() {
        window.speechSynthesis.speak(new SpeechSynthesisUtterance("Your response demonstrates superior academic syntax and narrative coherence. Continue applying this level of linguistic precision."));
    }
</script>
</body>
</html>
